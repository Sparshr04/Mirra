# Configuration for Semantic World Reconstruction Pipeline

# Hardware / Compute
device: "auto"  # Auto-detected at runtime in src/config.py (cuda > mps > cpu)

# Reconstruction Parameters
resolution: 512 #512
stride: 150

# Paths
data:
  raw: "data/raw"
  processed: "data/processed"

outputs:
  geometry: "outputs/geometry"
  semantics: "outputs/semantics"
  final: "outputs/final"

checkpoints: "checkpoints"

# Semantics
semantics:
  model_type: "sam2_hiera_large"
  min_mask_region_area: 100
  checkpoint_path: "checkpoints/sam2_hiera_large.pt"
  config_path: "sam2_hiera_l.yaml"

depth_model:
  type: "midas" # Example

# Unified Dataset Paths (single source of truth for both engines)
dataset:
  raw_video_dir: "data/raw"
  processed_frames_dir: "data/processed/frames"
  video_filename: ""  # Leave empty to auto-detect first video in raw_video_dir
  force_reprocess: false  # Set to true to always re-extract frames

# Geometry Engine Checkpointing
resume: true  # Enable caching of pairwise inference (skip on OOM resume)
