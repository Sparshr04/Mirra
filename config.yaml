# ═══════════════════════════════════════════════════════════════════════
# Mirra — Semantic 3D Reconstruction Pipeline
# Architecture: DUSt3R + SAM 2 + TSDF Volumetric Fusion
# ═══════════════════════════════════════════════════════════════════════
#
# Usage:
#   uv run python main.py                        # uses 'default' preset
#   uv run python main.py preset=draft           # fast/draft mode
#   uv run python main.py preset=high_quality    # maximum quality

# ─── Hardware / Compute ──────────────────────────────────────────────
device: "mps"                   # Optimized for Apple Silicon M2

# ─── Frame Extraction ────────────────────────────────────────────────
resolution: 1080                 # Resize extracted frames to NxN pixels
stride: 5                   # Process every N-th video frame

# ─── Geometry Backend (DUSt3R) ───────────────────────────────────────
geometry_backend: "dust3r"      # Fully pivoted to DUSt3R for wide-baseline accuracy
dust3r_batch_size: 2            # STRICTLY 1 to prevent MPS OOM crashes
max_photos: 15                  # Hard cap for All-Pairs matching to protect RAM

# ─── Pipeline Execution ─────────────────────────────────────────────
parallel_stages: false          # Run sequentially to protect unified memory
enable_denoiser: false          # Statistical + radius outlier removal on point cloud

# ─── Paths ───────────────────────────────────────────────────────────
data:
  raw: "data/raw"
  processed: "data/processed"
  
outputs:
  geometry: "outputs/geometry"
  semantics: "outputs/semantics"
  final: "outputs/final"

checkpoints: "checkpoints"

# ─── Semantics (SAM 2) ──────────────────────────────────────────────
semantics:
  model_type: "sam2_hiera_large"
  min_mask_region_area: 100
  checkpoint_path: "checkpoints/sam2_hiera_large.pt"
  config_path: "sam2_hiera_l.yaml"
  keyframe_interval: 10         # Auto-mask every N-th frame
  max_objects: 30               # Cap on tracked objects (OOM guard)

# ─── Unified Dataset Paths ──────────────────────────────────────────
dataset:
  raw_video_dir: "data/raw"
  photo_dir: "data/raw/photos"  # Priority Photo Ingestion Directory
  processed_frames_dir: "data/processed/frames"
  video_filename: ""            # Leave empty to auto-detect newest video
  force_reprocess: false

# ─── Geometry Engine Checkpointing ───────────────────────────────────
resume: true                    # Cache inference outputs; skip on re-run

# ─── TSDF Fusion Parameters ─────────────────────────────────────────
tsdf:
  voxel_length: 0.002           # Voxel resolution in meters (6mm default)
  sdf_trunc: 0.030              # SDF truncation distance (5× voxel_length)
  depth_trunc: 5.0              # Maximum depth in meters to integrate