# Configuration for Semantic World Reconstruction Pipeline

# Hardware / Compute
device: "mps"  # Metal Performance Shaders for Apple Silicon

# Reconstruction Parameters
resolution: 512
stride: 5

# Paths
data:
  raw: "data/raw"
  processed: "data/processed"

outputs:
  geometry: "outputs/geometry"
  semantics: "outputs/semantics"
  final: "outputs/final"

checkpoints: "checkpoints"

# Model Parameters (Placeholders for now)
sam2:
  checkpoint_path: "checkpoints/sam2_hiera_large.pt"
  model_cfg: "sam2_hiera_l.yaml"

depth_model:
  type: "midas" # Example
